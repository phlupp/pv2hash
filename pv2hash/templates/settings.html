<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PV2Hash – Einstellungen</title>
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-mark">PV</div>
                <div>
                    <div class="brand-title">PV2Hash</div>
                    <div class="brand-subtitle">{{ config.system.instance_name }}</div>
                </div>
            </div>

            <nav class="nav">
                <a class="nav-item" href="/">Dashboard</a>
                <a class="nav-item" href="/sources">Quellen</a>
                <a class="nav-item" href="/miners">Miner</a>
                <a class="nav-item active" href="/settings">Einstellungen</a>
                <span class="nav-item disabled">Verlauf</span>
                <a class="nav-item" href="/system">System</a>
            </nav>
        </aside>

        <main class="content">
            <header class="topbar">
                <div>
                    <h1>Einstellungen</h1>
                    <p>Basis-Konfiguration für Instanz und Regelung</p>
                </div>
            </header>

            {% if saved %}
            <section class="alert success">
                Einstellungen gespeichert und Runtime neu geladen.
            </section>
            {% endif %}

            <form method="post" action="/settings">
                <section class="grid grid-2">
                    <article class="card">
                        <div class="card-head">
                            <h2>Allgemein</h2>
                        </div>

                        <div class="form-grid">
                            <label>
                                <span>Instanzname</span>
                                <input type="text" name="instance_name" value="{{ config.system.instance_name }}">
                            </label>

                            <label>
                                <span>Refresh-Intervall (Sekunden)</span>
                                <input type="number" name="refresh_seconds" value="{{ config.app.refresh_seconds }}" min="1" max="60">
                            </label>

                            <label>
                                <span>Policy-Modus</span>
                                <select name="policy_mode">
                                    <option value="coarse" {% if config.control.policy_mode == "coarse" %}selected{% endif %}>coarse</option>
                                    <option value="fine" {% if config.control.policy_mode == "fine" %}selected{% endif %}>fine</option>
                                </select>
                            </label>

                            <label>
                                <span>Verteilstrategie</span>
                                <select name="distribution_mode">
                                    <option value="equal" {% if config.control.distribution_mode == "equal" %}selected{% endif %}>equal</option>
                                    <option value="cascade" {% if config.control.distribution_mode == "cascade" %}selected{% endif %}>cascade</option>
                                </select>
                            </label>
                        </div>
                    </article>

                    <article class="card">
                        <div class="card-head">
                            <h2>Regelung</h2>
                        </div>

                        <div class="form-grid">
                            <label>
                                <span>Hysterese (W)</span>
                                <input
                                    type="number"
                                    name="switch_hysteresis_w"
                                    value="{{ config.control.switch_hysteresis_w if config.control.switch_hysteresis_w is defined else 100 }}"
                                    min="0"
                                >
                                <small class="help">Zusätzliche Reserve vor dem nächsten Zuschalten bzw. Rücksetzen der Import-Erkennung.</small>
                            </label>

                            <label>
                                <span>Mindest-Schaltintervall (Sekunden)</span>
                                <input
                                    type="number"
                                    name="min_switch_interval_seconds"
                                    value="{{ config.control.min_switch_interval_seconds if config.control.min_switch_interval_seconds is defined else 60 }}"
                                    min="0"
                                >
                                <small class="help">Minimale Zeit zwischen zwei Profil-/Verteiländerungen.</small>
                            </label>

                            <label>
                                <span>Max. Netzbezug (W)</span>
                                <input
                                    type="number"
                                    name="max_import_w"
                                    value="{{ config.control.max_import_w if config.control.max_import_w is defined else 200 }}"
                                    min="0"
                                >
                                <small class="help">Ab diesem Bezug beginnt die Rückregel-Überwachung.</small>
                            </label>

                            <label>
                                <span>Import halten / Verzögerung (Sekunden)</span>
                                <input
                                    type="number"
                                    name="import_hold_seconds"
                                    value="{{ config.control.import_hold_seconds if config.control.import_hold_seconds is defined else 15 }}"
                                    min="0"
                                >
                                <small class="help">Wie lange zu hoher Bezug anstehen muss, bevor heruntergeregelt wird.</small>
                            </label>
                        </div>
                    </article>
					
					<article class="card">
						<div class="card-head">
							<h2>Quellen-Fallback</h2>
						</div>

						<div class="form-grid">
							<label>
								<span>Bei stale</span>
								<select name="stale_mode">
									<option value="hold_current" {% if config.control.source_loss.stale.mode == "hold_current" %}selected{% endif %}>hold_current</option>
									<option value="off_all" {% if config.control.source_loss.stale.mode == "off_all" %}selected{% endif %}>off_all</option>
									<option value="force_profile" {% if config.control.source_loss.stale.mode == "force_profile" %}selected{% endif %}>force_profile</option>
								</select>
							</label>

							<label>
								<span>Stale Fallback-Profil</span>
								<select name="stale_fallback_profile">
									<option value="off" {% if config.control.source_loss.stale.fallback_profile == "off" %}selected{% endif %}>off</option>
									<option value="eco" {% if config.control.source_loss.stale.fallback_profile == "eco" %}selected{% endif %}>eco</option>
									<option value="mid" {% if config.control.source_loss.stale.fallback_profile == "mid" %}selected{% endif %}>mid</option>
									<option value="high" {% if config.control.source_loss.stale.fallback_profile == "high" %}selected{% endif %}>high</option>
								</select>
							</label>

							<label>
								<span>Stale halten (Sekunden)</span>
								<input
									type="number"
									name="stale_hold_seconds"
									value="{{ config.control.source_loss.stale.hold_seconds if config.control.source_loss.stale.hold_seconds is defined else 0 }}"
									min="0"
								>
								<small class="help">0 = unbegrenzt halten bis Verbindung zurückkehrt.</small>
							</label>

							<label>
								<span>Bei offline</span>
								<select name="offline_mode">
									<option value="hold_current" {% if config.control.source_loss.offline.mode == "hold_current" %}selected{% endif %}>hold_current</option>
									<option value="off_all" {% if config.control.source_loss.offline.mode == "off_all" %}selected{% endif %}>off_all</option>
									<option value="force_profile" {% if config.control.source_loss.offline.mode == "force_profile" %}selected{% endif %}>force_profile</option>
								</select>
							</label>

							<label>
								<span>Offline Fallback-Profil</span>
								<select name="offline_fallback_profile">
									<option value="off" {% if config.control.source_loss.offline.fallback_profile == "off" %}selected{% endif %}>off</option>
									<option value="eco" {% if config.control.source_loss.offline.fallback_profile == "eco" %}selected{% endif %}>eco</option>
									<option value="mid" {% if config.control.source_loss.offline.fallback_profile == "mid" %}selected{% endif %}>mid</option>
									<option value="high" {% if config.control.source_loss.offline.fallback_profile == "high" %}selected{% endif %}>high</option>
								</select>
							</label>

							<label>
								<span>Offline halten (Sekunden)</span>
								<input
									type="number"
									name="offline_hold_seconds"
									value="{{ config.control.source_loss.offline.hold_seconds if config.control.source_loss.offline.hold_seconds is defined else 0 }}"
									min="0"
								>
								<small class="help">0 = unbegrenzt halten bis Verbindung zurückkehrt.</small>
							</label>
						</div>
					</article>
                </section>

                <section class="card">
                    <div class="actions">
                        <button class="btn" type="submit">Einstellungen speichern</button>
                    </div>
                </section>
            </form>
        </main>
    </div>
</body>
</html>
