<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PV2Hash – Einstellungen</title>
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-mark">PV</div>
                <div>
                    <div class="brand-title">PV2Hash</div>
                    <div class="brand-subtitle">{{ config.system.instance_name }}</div>
                </div>
            </div>

            <nav class="nav">
                <a class="nav-item" href="/">Dashboard</a>
                <a class="nav-item" href="/sources">Quellen</a>
                <a class="nav-item" href="/miners">Miner</a>
                <a class="nav-item active" href="/settings">Einstellungen</a>
                <span class="nav-item disabled">Verlauf</span>
                <a class="nav-item" href="/system">System</a>
            </nav>
        </aside>

        <main class="content">
            <header class="topbar">
                <div>
                    <h1>Einstellungen</h1>
                    <p>Basis-Konfiguration für Instanz und grobe Regelung</p>
                </div>
            </header>

			{% if saved %}
			<section class="alert success">
				Einstellungen gespeichert und Runtime neu geladen.
			</section>
			{% endif %}

            <form method="post" action="/settings">
                <section class="grid grid-2">
                    <article class="card">
                        <div class="card-head">
                            <h2>Allgemein</h2>
                        </div>

                        <div class="form-grid">
                            <label>
                                <span>Instanzname</span>
                                <input type="text" name="instance_name" value="{{ config.system.instance_name }}">
                            </label>

                            <label>
                                <span>Refresh-Intervall (Sekunden)</span>
                                <input type="number" name="refresh_seconds" value="{{ config.app.refresh_seconds }}" min="1" max="60">
                            </label>

                            <label>
                                <span>Policy-Modus</span>
                                <select name="policy_mode">
                                    <option value="coarse" {% if config.control.policy_mode == "coarse" %}selected{% endif %}>coarse</option>
                                    <option value="fine" {% if config.control.policy_mode == "fine" %}selected{% endif %}>fine</option>
                                </select>
                            </label>

                            <label>
                                <span>Verteilstrategie</span>
                                <select name="distribution_mode">
                                    <option value="equal" {% if config.control.distribution_mode == "equal" %}selected{% endif %}>equal</option>
                                    <option value="cascade" {% if config.control.distribution_mode == "cascade" %}selected{% endif %}>cascade</option>
                                </select>
                            </label>
                        </div>
                    </article>

                    <article class="card">
						<div class="card-head">
							<h2>Regelung</h2>
						</div>

						<div class="form-grid">
							<label>
								<span>Eco ab Einspeisung kleiner als</span>
								<input type="number" name="threshold_eco" value="{{ config.control.coarse_thresholds.eco }}">
								<small class="help">Negativer Wert. Beispiel: -500 = ab 500 W Einspeisung.</small>
							</label>

							<label>
								<span>Mid ab Einspeisung kleiner als</span>
								<input type="number" name="threshold_mid" value="{{ config.control.coarse_thresholds.mid }}">
							</label>

							<label>
								<span>High ab Einspeisung kleiner als</span>
								<input type="number" name="threshold_high" value="{{ config.control.coarse_thresholds.high }}">
							</label>

							<label>
								<span>Hysterese (W)</span>
								<input type="number" name="switch_hysteresis_w" value="{{ config.control.switch_hysteresis_w or 100 }}" min="0">
								<small class="help">Verhindert Flattern an den Schaltschwellen.</small>
							</label>

							<label>
								<span>Mindest-Schaltintervall (Sekunden)</span>
								<input
									type="number"
									name="min_switch_interval_seconds"
									value="{{ config.control.min_switch_interval_seconds or 60 }}"
									min="0"
								>
								<small class="help">Zeit zwischen zwei Profilwechseln.</small>
							</label>

							<label>
								<span>Max. Netzbezug (W)</span>
								<input
									type="number"
									name="max_import_w"
									value="{{ config.control.max_import_w if config.control.max_import_w is defined else 200 }}"
									min="0"
								>
								<small class="help">Bis zu diesem Bezug darf coarse noch tolerieren.</small>
							</label>

							<label>
								<span>Import halten / Verzögerung (Sekunden)</span>
								<input
									type="number"
									name="import_hold_seconds"
									value="{{ config.control.import_hold_seconds if config.control.import_hold_seconds is defined else 15 }}"
									min="0"
								>
								<small class="help">Wie lange zu hoher Bezug anstehen muss, bevor zurückgeschaltet wird.</small>
							</label>
						</div>
					</article>
					
                </section>

                <section class="card">
                    <div class="actions">
                        <button class="btn" type="submit">Einstellungen speichern</button>
                    </div>
                </section>
            </form>
        </main>
    </div>
</body>
</html>
