<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PV2Hash – Einstellungen</title>
    <link rel="icon" href="/static/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <link rel="manifest" href="/static/site.webmanifest">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
    <div class="layout">
        {% set nav_active = 'settings' %}
        {% set nav_subtitle = instance_name %}
        {% include "partials/nav.html" %}

        <main class="content">
            <header class="topbar">
                <div>
                    <h1>Einstellungen</h1>
                    <p>Basis-Konfiguration für Instanz und Regelung</p>
                </div>
            </header>

            <section data-settings-root>
                <form data-settings-form>
                    <section class="grid grid-2" data-settings-model-container>
                        <article class="card">
                            <div class="card-head">
                                <div>
                                    <h2>Einstellungen werden geladen …</h2>
                                    <p class="card-subtitle">Das GUI-Modell wird vom Server geladen.</p>
                                </div>
                            </div>
                        </article>
                    </section>

                    <section class="card top-gap">
                        <div class="actions">
                            <button class="btn" type="button" data-settings-save>Einstellungen speichern</button>
                        </div>
                    </section>
                </form>
            </section>
        </main>
    </div>

</body>
</html>
