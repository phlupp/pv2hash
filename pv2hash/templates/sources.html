<!doctype html>
<html lang="de">
<head>
    {% set page_title = "PV2Hash – Messungen" %}
    {% include "partials/head.html" %}
</head>
<body>
    <div class="layout">
        {% set nav_active = 'sources' %}
        {% set nav_subtitle = 'Messungen' %}
        {% include "partials/nav.html" %}

        <main class="content" data-sources-live-root data-refresh-seconds="{{ refresh_seconds }}">
            <header class="topbar">
                <div>
                    <h1>Messungen</h1>
                    <p>Netz-Messung und Batterie werden live aktualisiert.</p>
                </div>
            </header>

            <form method="post" action="/sources" data-sources-config-form>
                <section class="grid grid-2 measurement-summary-grid" data-sources-model-container>
                    <article class="card">
                        <div class="card-head">
                            <div>
                                <h2>Messungen werden geladen …</h2>
                                <p class="card-subtitle">Bitte kurz warten.</p>
                            </div>
                        </div>
                    </article>
                </section>
            </form>
        </main>
    </div>

</body>
</html>
