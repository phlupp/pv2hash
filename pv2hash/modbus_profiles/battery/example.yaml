# PV2Hash Modbus TCP Batterie-Profil
#
# Diese Datei ist ein Beispiel und wird in der GUI nicht als auswählbares Profil angezeigt.
# Für eigene Profile eine neue YAML-Datei in diesem Ordner oder später unter
# /var/lib/pv2hash/modbus_profiles/battery/ ablegen und hidden entfernen/auf false setzen.
#
# Unterstützte register_type Werte:
#   holding         -> Modbus function 0x03
#   input           -> Modbus function 0x04
#   coil            -> Modbus function 0x01
#   discrete_input  -> Modbus function 0x02
#
# Unterstützte type Werte:
#   uint8, int8, uint16, int16, uint32, int32, float32
#
# Unterstützte endian Werte:
#   big_endian, little_endian
#
# Hinweise:
# - Das Profil belegt nur Formularwerte vor.
# - Pflichtfelder, Einheiten, Layout und Hilfetexte definiert weiterhin der Treiber.
# - Optional konfigurierte Werte dürfen weggelassen werden.
# - timeout_ms wird beim Anwenden in request_timeout_seconds umgerechnet.

id: example_battery
name: Example Battery BMS
vendor: ExampleVendor
description: Beispielprofil für eine Modbus TCP Batterie
hidden: true

values:
  port: 502
  unit_id: 1
  poll_interval_ms: 1000
  timeout_ms: 800

  soc:
    address: 100
    register_type: holding
    type: uint16
    endian: big_endian
    factor: 0.1

  charge_power:
    address: 101
    register_type: holding
    type: int32
    endian: big_endian
    factor: 1

  discharge_power:
    address: 103
    register_type: holding
    type: int32
    endian: big_endian
    factor: 1

  voltage:
    address: 110
    register_type: input
    type: uint16
    endian: big_endian
    factor: 0.1

  current:
    address: 111
    register_type: input
    type: int16
    endian: big_endian
    factor: 0.1

  soh:
    address: 112
    register_type: input
    type: uint16
    endian: big_endian
    factor: 1

  temperature:
    address: 113
    register_type: input
    type: int16
    endian: big_endian
    factor: 0.1

  capacity:
    address: 114
    register_type: input
    type: uint16
    endian: big_endian
    factor: 0.1

  max_charge_current:
    address: 115
    register_type: input
    type: uint16
    endian: big_endian
    factor: 0.1

  max_discharge_current:
    address: 116
    register_type: input
    type: uint16
    endian: big_endian
    factor: 0.1
